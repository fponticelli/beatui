name: Update Visual Snapshots

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-snapshots:
    name: Generate Linux snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm --filter @tempots/beatui build

      - name: Install Playwright browsers
        run: pnpm --filter @beatui/docs exec playwright install --with-deps chromium

      - name: Update snapshots
        run: pnpm --filter @beatui/docs test:e2e:update-snapshots
        env:
          CI: true

      - name: Upload snapshots
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots-linux
          path: apps/docs/e2e/**/*-snapshots/*-chromium-linux.png
          retention-days: 7

      - name: Commit snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'apps/docs/e2e/visual.spec.ts-snapshots/'
          git diff --staged --quiet || git commit -m "chore: update visual regression snapshots for Linux/Chromium"
          git push
